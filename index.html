<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-4</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --card-bg: #131c32;
            --border-color: #223154;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff007f;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 10px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }

        #status {
            font-size: 14px;
            color: #ffb700;
            margin-bottom: 20px;
            font-weight: 500;
        }

        #btn {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: #0a0f1d;
            background: linear-gradient(90deg, var(--neon-cyan), #00ffaa);
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0, 243, 255, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        #btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 243, 255, 0.6);
        }
        #btn:disabled {
            background: #222e45;
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        .dashboard {
            display: flex;
            justify-content: center;
            gap: 25px;
            max-width: 900px;
            margin: 25px auto 0 auto;
            flex-wrap: wrap;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            flex: 1;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: left;
            border-left: 4px solid var(--neon-cyan);
            padding-left: 10px;
        }
        .card-title.vision {
            border-left-color: var(--neon-pink);
        }

        /* 音声系UI */
        .audio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 260px;
        }
        #audio-res {
            font-size: 28px;
            font-weight: 700;
            color: var(--neon-cyan);
            font-family: monospace;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        .meter-bar {
            width: 100%;
            max-width: 240px;
            background: #0d1527;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e2942;
            position: relative;
        }
        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            transition: width 0.05s ease;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* 人認識系UI */
        .vision-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #person-res {
            font-size: 18px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 30px;
            background: #0d1527;
            color: var(--text-muted);
            margin-bottom: 15px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .camera-wrapper {
            position: relative;
            width: 280px;
            height: 210px;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
</head>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>06-24-22</title>
    <style>
        body { margin: 0; background: #0c101b; overflow: hidden; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 10; }
        #info { position: absolute; top: 20px; left: 20px; color: #00d2ff; font-family: sans-serif; z-index: 20; }
        #btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30; padding: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="info">STATUS: STANDBY</div>
    <button id="btn">START</button>
    <canvas id="canvas"></canvas>
    <video id="v" style="display:none;" autoplay playsinline muted></video>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const v = document.getElementById('v');
        const info = document.getElementById('info');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let curX = 0, targetX = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            curX += (targetX - curX) * 0.1;
            
            const cy = canvas.height / 2;
            [canvas.width/2 - 100, canvas.width/2 + 100].forEach(x => {
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(x, cy, 80, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#00d2ff";
                ctx.beginPath(); ctx.arc(x + curX, cy, 40, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        document.getElementById('btn').onclick = async () => {
            try {
                const model = await blazeface.load();
                const stream = await navigator.mediaDevices.getUserMedia({video: true});
                v.srcObject = stream;
                document.getElementById('btn').style.display = 'none';

                async function loop() {
                    const preds = await model.estimateFaces(v, false);
                    if (preds.length > 0) {
                        const box = preds[0].topLeft;
                        const box2 = preds[0].bottomRight;
                        const centerX = (box[0] + box2[0]) / 2;
                        // 画面幅（推測640）に対する相対位置で計算
                        targetX = (centerX - 320) * 0.5;
                        info.innerText = `OFFSET: ${Math.round((centerX/640 - 0.5)*200)}%`;
                    }
                    requestAnimationFrame(loop);
                }
                loop();
            } catch(e) { info.innerText = "ERROR: " + e.message; }
        };
    </script>
</body>
</html>

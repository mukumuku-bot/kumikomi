<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-7</title>
    <style>
        :root {
            --bg: #080c14;
            --card: #0f1626;
            --border: #1e293b;
            --cyan: #00d2ff;
            --text: #e2e8f0;
        }
        body {
            font-family: 'Consolas', 'Courier New', monospace, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 10px;
            text-align: center;
        }
        h1 { font-size: 2.2rem; letter-spacing: 4px; margin: 0 0 5px 0; }
        #status { font-size: 13px; color: var(--cyan); margin-bottom: 20px; }
        
        #btn {
            padding: 14px 45px; font-size: 16px; font-weight: bold; cursor: pointer;
            color: var(--bg); background: var(--cyan); border: 1px solid var(--cyan);
            border-radius: 4px; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            letter-spacing: 2px; text-transform: uppercase;
        }
        #btn:disabled { background: #111724; border-color: #475569; color: #475569; box-shadow: none; }

        /* 常に上下の縦並び（上に音声、下に人認識）を維持しつつ、横幅を最適化 */
        .dashboard { display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 640px; margin: 20px auto 0 auto; }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            padding: 20px; width: 100%; box-sizing: border-box; position: relative;
        }
        .card::before {
            content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px;
            border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan);
        }
        .card-title { font-size: 12px; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; text-align: left; color: var(--cyan); opacity: 0.8; }

        /* AUDIO */
        .audio-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 140px; }
        #audio-res { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
        .meter-bar { width: 100%; max-width: 300px; background: #060912; height: 12px; border: 1px solid #161f30; }
        .fill { height: 100%; width: 0%; background: linear-gradient(90deg, #0066cc, var(--cyan)); box-shadow: 0 0 8px var(--cyan); }

        /* VISION (カメラとステータス表示を横並びにするレイアウト) */
        .vision-container { display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; justify-content: center; gap: 20px; }
        
        /* ターゲット表示を巨大化＆インジケーター調に強化 */
        #person-res { 
            font-size: 20px; font-weight: bold; padding: 20px; background: #060912; 
            border: 1px solid var(--border); border-radius: 4px; min-width: 240px; box-sizing: border-box;
            letter-spacing: 0.5px; line-height: 1.4;
        }
        
        .camera-wrapper { position: relative; width: 320px; height: 240px; background: #000; border: 1px solid var(--border); flex-shrink: 0; }
        #webcam, #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #webcam { z-index: 1; }
        #overlay { z-index: 2; pointer-events: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
</head>
<body>

    <h1>06-24-7</h1>
    <div id="status">INITIALIZING SYSTEM...</div>
    <button id="btn" disabled>START SYSTEM</button>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">[ AUDIO ANALYZER ]</div>
            <div class="audio-container">
                <div id="audio-res">0.00 %</div>
                <div class="meter-bar"><div id="left-fill" class="fill"></div></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">[ VISION TRACKER ]</div>
            <div class="vision-container">
                <div class="camera-wrapper">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                </div>
                <div id="person-res">SYSTEM STANDBY</div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');
        const audioRes = document.getElementById('audio-res');
        const personRes = document.getElementById('person-res');
        const leftFill = document.getElementById('left-fill');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let model = null;

        (async function loadAI() {
            try {
                statusDiv.innerText = "LOADING VISION MODEL...";
                model = await cocoSsd.load({ base: 'mobilenet_v2' });
                statusDiv.innerText = "SYSTEM READY";
                btn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "VISION OFFLINE / AUDIO ONLY ACTIVE";
                btn.disabled = false; 
            }
        })();

        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true },
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
                });

                btn.style.display = 'none';
                statusDiv.style.display = 'none';
                video.srcObject = stream;
                video.onloadedmetadata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; };
                
                // ① AUDIO
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                audioCtx.createMediaStreamSource(stream).connect(analyser);
                const dataArray = new Uint8Array(analyser.fftSize);

                function checkVolume() {
                    analyser.getByteTimeDomainData(dataArray);
                    let maxL = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const absL = Math.abs(dataArray[i] - 128);
                        if (absL > maxL) maxL = absL;
                    }
                    let volL = (maxL > 1) ? Math.min((((maxL - 1) / 126) * 100) * 50, 100) : 0;
                    leftFill.style.width = `${volL}%`;
                    audioRes.innerText = `${volL.toFixed(2)} %`;
                    requestAnimationFrame(checkVolume);
                }

                // ② VISION
                function detectPerson() {
                    if (video.videoWidth > 0 && model) {
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            const person = predictions.find(p => p.class === 'person');
                            
                            if (person) {
                                const [x, y, width, height] = person.bbox;
                                ctx.strokeStyle = "#00d2ff"; ctx.lineWidth = 3;
                                ctx.strokeRect(x, y, width, height);
                                ctx.fillStyle = "#00d2ff"; ctx.beginPath();
                                ctx.arc(x + (width / 2), y + (height / 2), 5, 0, 2 * Math.PI); ctx.fill();
                                
                                const offset = Math.round(((x + (width / 2)) - (canvas.width / 2)) / (canvas.width / 2) * 100);

                                if (Math.abs(offset) <= 10) {
                                    setVisionUI("TARGET:<br>CENTER (0%)", "var(--cyan)", "rgba(0, 210, 255, 0.1)");
                                } else {
                                    const dir = offset > 0 ? "RIGHT" : "LEFT";
                                    setVisionUI(`TARGET:<br>${dir}_OFFSET (${offset > 0 ? '+' : ''}${offset}%)`, "#ffffff", "rgba(255, 255, 255, 0.05)");
                                }
                            } else {
                                setVisionUI("NO TARGET<br>DETECTED", "#475569", "#060912");
                            }
                        });
                    }
                    setTimeout(detectPerson, 100);
                }

                function setVisionUI(text, color, bg) {
                    personRes.innerHTML = text; personRes.style.color = color;
                    personRes.style.borderColor = color === "#475569" ? "var(--border)" : color;
                    personRes.style.background = bg;
                }

                checkVolume();
                detectPerson();
            } catch (err) { alert('ERROR: ' + err.message); }
        });
    </script>
</body>
</html>

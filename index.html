<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-19</title>
    <style>
        body { margin: 0; background: #0c101b; overflow: hidden; }
        #eye-canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #bottom-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 160px;
            background: #161b26; border-top: 2px solid #242b3d;
            z-index: 10; display: flex; align-items: center; justify-content: space-around;
        }
        #btn {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 16px 45px; z-index: 20; cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="btn">START TRACKING</button>
    <canvas id="eye-canvas"></canvas>

    <div id="bottom-panel">
        <div id="tracking-info" style="color:#00d2ff; font-family:monospace;">STATUS: STANDBY</div>
    </div>

    <video id="webcam" style="display:none;" autoplay playsinline muted></video>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        const canvas = document.getElementById('eye-canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcam');
        const info = document.getElementById('tracking-info');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let curX = 0, targetX = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            curX += (targetX - curX) * 0.1;
            
            const cy = canvas.height / 2;
            [canvas.width/2 - 100, canvas.width/2 + 100].forEach(x => {
                ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(x, cy, 80, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#00d2ff";
                ctx.beginPath(); ctx.arc(x + curX, cy, 40, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        document.getElementById('btn').onclick = async () => {
            const model = await blazeface.load();
            const stream = await navigator.mediaDevices.getUserMedia({video: true});
            video.srcObject = stream;
            document.getElementById('btn').style.display = 'none';

            async function loop() {
                const preds = await model.estimateFaces(video, false);
                if (preds.length > 0) {
                    const eyes = preds[0].landmarks;
                    const eyesX = (eyes[0][0] + eyes[1][0]) / 2;
                    targetX = (eyesX - 320) * 0.3;
                    info.innerText = `OFFSET: ${Math.round((eyesX/640 - 0.5)*200)}%`;
                }
                requestAnimationFrame(loop);
            }
            loop();
        };
    </script>
</body>
</html>

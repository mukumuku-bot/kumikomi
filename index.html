<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-12</title>
    <style>
        :root {
            --bg: #0c101b;
            --card: #161b26;
            --border: #242b3d;
            --cyan: #00d2ff;
            --text: #e2e8f0;
        }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace, sans-serif; overflow: hidden;
        }

        /* メイン：二個の目用全画面キャンバス */
        #eye-canvas { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 160px); z-index: 1; }

        /* 下部：コントロール＆ステータス統合パネル */
        #bottom-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 160px;
            background: var(--card); border-top: 2px solid var(--border);
            box-sizing: border-box; z-index: 10;
            display: flex; align-items: center; justify-content: space-around; padding: 10px;
        }

        .panel-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }

        /* 左側：システムタイトル表示セクション */
        .title-box {
            font-size: 20px; font-weight: bold; color: #ffffff; letter-spacing: 3px;
            background: #090d16; padding: 15px; border: 1px solid var(--border); border-radius: 4px;
            min-width: 140px; text-align: center; box-shadow: inset 0 0 10px rgba(0,210,255,0.05);
        }
        .title-sub { font-size: 9px; color: var(--cyan); letter-spacing: 1px; margin-top: 5px; opacity: 0.7; }

        /* 中央：人のトラッキング＆ずれ％表示 */
        #tracking-info {
            font-size: 18px; font-weight: bold; color: var(--cyan); text-align: left;
            min-width: 260px; line-height: 1.5; letter-spacing: 1px;
            background: #090d16; padding: 15px; border: 1px solid var(--border); border-radius: 4px;
        }

        /* 右側：カメラ表示（コンパクトサイズ） */
        .camera-wrapper { position: relative; width: 160px; height: 120px; background: #000; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); } /* 鏡映しに補正 */

        /* 起動ボタン */
        #btn {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 16px 45px; font-size: 16px; font-weight: bold; cursor: pointer;
            color: var(--bg); background: var(--cyan); border: none; border-radius: 4px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.4); z-index: 20; letter-spacing: 2px;
        }
        #btn:disabled { background: #1a2333; color: #475569; box-shadow: none; cursor: not-allowed; }
        #status { position: absolute; top: calc(40% + 50px); left: 0; width: 100%; text-align: center; font-size: 13px; color: var(--cyan); z-index: 20; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
</head>
<body>

    <button id="btn" disabled>INITIALIZING...</button>
    <div id="status">LOADING ANIME VISION ENGINE...</div>

    <canvas id="eye-canvas"></canvas>

    <div id="bottom-panel">
        <div class="panel-section">
            <div class="title-box">
                06-24-12
                <div class="title-sub">VISION SYSTEM</div>
            </div>
        </div>

        <div class="panel-section">
            <div id="tracking-info">
                STATUS: STANDBY<br>
                OFFSET: -- %
            </div>
        </div>

        <div class="panel-section">
            <div class="camera-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');
        const trackingInfo = document.getElementById('tracking-info');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('eye-canvas');
        const ctx = canvas.getContext('2d');
        
        let model = null;

        // 視線コントロール用
        let currentX = 0; 
        let targetX = 0;
        let hasPerson = false;
        let personPercent = 0;

        // まばたきコントロール
        let blinkScale = 1.0; 
        let isBlinking = false;
        let nextBlinkTime = Date.now() + 3000;

        // アイドリング用
        let lastIdleTime = 0;
        let idleTargetX = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 160;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // AIモデルロード
        (async function loadAI() {
            try {
                model = await blazeface.load();
                statusDiv.innerText = "EYE SYSTEM READY";
                btn.innerText = "START ANIME EYES";
                btn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "ENGINE ERROR";
            }
        })();

        btn.addEventListener('click', async () => {
            try {
                // 【エラー大元修正】Safari対策としてaudioを完全排除し、videoの過剰な解像度指定を消して超安全に
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }
                });

                btn.style.display = 'none';
                statusDiv.style.display = 'none';
                video.srcObject = stream;

                // トラッキング（精度より滑らかさ・それっぽさ重視）
                function detect() {
                    if (video.videoWidth > 0 && model) {
                        model.estimateFaces(video, false).then(predictions => {
                            if (predictions.length > 0) {
                                hasPerson = true;
                                const landmarks = predictions[0].landmarks;
                                const eyesCenterX = (landmarks[0][0] + landmarks[1][0]) / 2;
                                
                                // 動的なビデオ幅を元に中央からのズレを鏡合わせ補正して算出 (-100% 〜 +100%)
                                const widthHalf = video.videoWidth / 2;
                                personPercent = Math.round(-((eyesCenterX - widthHalf) / widthHalf) * 100);
                                
                                if (personPercent > 100) personPercent = 100;
                                if (personPercent < -100) personPercent = -100;

                                // 目標の視線位置（左右の最大振れ幅）
                                targetX = (personPercent / 100) * 35; 

                                // 下部のテキスト表示を更新
                                if (Math.abs(personPercent) <= 12) {
                                    trackingInfo.innerHTML = `STATUS: <span style="color:var(--cyan);">LOCK_ON (CENTER)</span><br>OFFSET: 0%`;
                                } else {
                                    const dir = personPercent > 0 ? "RIGHT" : "LEFT";
                                    trackingInfo.innerHTML = `STATUS: <span style="color:#ffffff;">TRACKING_${dir}</span><br>OFFSET: ${personPercent > 0 ? '+' : ''}${personPercent}%`;
                                }
                            } else {
                                hasPerson = false;
                                trackingInfo.innerHTML = `STATUS: <span style="color:#475569;">SEARCHING...</span><br>OFFSET: -- %`;
                            }
                        });
                    }
                    setTimeout(detect, 50); 
                }

                // アニメ目の描画＆自律アニメーション
                function drawLoop() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const now = Date.now();

                    // 視線の動きの計算（滑らかな線形補間）
                    if (hasPerson) {
                        currentX += (targetX - currentX) * 0.08;
                    } else {
                        if (now > lastIdleTime) {
                            idleTargetX = (Math.random() - 0.5) * 50;
                            lastIdleTime = now + 1500 + Math.random() * 1500;
                        }
                        currentX += (idleTargetX - currentX) * 0.05;
                    }

                    // まばたきロジック
                    if (!isBlinking && now > nextBlinkTime) {
                        isBlinking = true;
                    }
                    if (isBlinking) {
                        blinkScale -= 0.25;
                        if (blinkScale <= 0) {
                            blinkScale = 0;
                            isBlinking = false;
                        }
                    } else if (blinkScale < 1.0) {
                        blinkScale += 0.2;
                        if (blinkScale >= 1.0) {
                            blinkScale = 1.0;
                            nextBlinkTime = now + 2000 + Math.random() * 4000;
                        }
                    }

                    // 2個の目の描画位置
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    
                    const eyeWidth = Math.min(canvas.width, canvas.height) * 0.22;
                    const eyeHeight = eyeWidth * 1.2; 
                    const eyeSpacing = eyeWidth * 1.1; 

                    const leftEyeCenter = { x: centerX - eyeSpacing, y: centerY };
                    const rightEyeCenter = { x: centerX + eyeSpacing, y: centerY };

                    function drawAnimeEye(center) {
                        ctx.save();
                        ctx.translate(center.x, center.y);
                        ctx.scale(1.0, blinkScale);

                        // 1. 白目
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath();
                        ctx.ellipse(0, 0, eyeWidth, eyeHeight, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // 2. アイライン
                        ctx.strokeStyle = "#1b2030";
                        ctx.lineWidth = 8;
                        ctx.stroke();
                        ctx.clip();

                        // 3. 巨大な黒目（グラデーション虹彩）
                        const irisX = currentX; 
                        const irisY = 5; 
                        const irisRadius = eyeWidth * 0.75;

                        const irisGrad = ctx.createRadialGradient(irisX, irisY, 5, irisX, irisY, irisRadius);
                        irisGrad.addColorStop(0, "#003c66"); 
                        irisGrad.addColorStop(0.6, "var(--cyan)"); 
                        irisGrad.addColorStop(1, "#008bbb");
                        
                        ctx.fillStyle = irisGrad;
                        ctx.beginPath();
                        ctx.arc(irisX, irisY, irisRadius, 0, Math.PI * 2);
                        ctx.fill();

                        // 4. 瞳孔
                        ctx.fillStyle = "#060a12";
                        ctx.beginPath();
                        ctx.arc(irisX, irisY + 5, irisRadius * 0.35, 0, Math.PI * 2);
                        ctx.fill();

                        // 5. ハイライト
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath();
                        ctx.arc(irisX - 15, irisY - 25, 14, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.beginPath();
                        ctx.arc(irisX + 20, irisY + 25, 6, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.restore();
                        
                        // 完全に閉じている時の線
                        if (blinkScale <= 0.05) {
                            ctx.save();
                            ctx.translate(center.x, center.y);
                            ctx.strokeStyle = "#1b2030";
                            ctx.lineWidth = 10;
                            ctx.lineCap = "round";
                            ctx.beginPath();
                            ctx.moveTo(-eyeWidth, 0);
                            ctx.lineTo(eyeWidth, 0);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }

                    drawAnimeEye(leftEyeCenter);
                    drawAnimeEye(rightEyeCenter);

                    requestAnimationFrame(drawLoop);
                }

                detect();
                drawLoop();
            } catch (err) { alert('ERROR: ' + err.message); }
        });
    </script>
</body>
</html>

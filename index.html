<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-4</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --card-bg: #131c32;
            --border-color: #223154;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff007f;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 10px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }

        #status {
            font-size: 14px;
            color: #ffb700;
            margin-bottom: 20px;
            font-weight: 500;
        }

        #btn {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            color: #0a0f1d;
            background: linear-gradient(90deg, var(--neon-cyan), #00ffaa);
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0, 243, 255, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        #btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 243, 255, 0.6);
        }
        #btn:disabled {
            background: #222e45;
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        .dashboard {
            display: flex;
            justify-content: center;
            gap: 25px;
            max-width: 900px;
            margin: 25px auto 0 auto;
            flex-wrap: wrap;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            flex: 1;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: left;
            border-left: 4px solid var(--neon-cyan);
            padding-left: 10px;
        }
        .card-title.vision {
            border-left-color: var(--neon-pink);
        }

        /* 音声系UI */
        .audio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 260px;
        }
        #audio-res {
            font-size: 28px;
            font-weight: 700;
            color: var(--neon-cyan);
            font-family: monospace;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        .meter-bar {
            width: 100%;
            max-width: 240px;
            background: #0d1527;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e2942;
            position: relative;
        }
        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            transition: width 0.05s ease;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* 人認識系UI */
        .vision-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #person-res {
            font-size: 18px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 30px;
            background: #0d1527;
            color: var(--text-muted);
            margin-bottom: 15px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .camera-wrapper {
            position: relative;
            width: 280px;
            height: 210px;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
</head>
<body>

    <h1>06-24-4</h1>
    <div id="status">AIシステム初期化中...</div>
    <button id="btn" disabled>システムを起動</button>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">Audio System</div>
            <div class="audio-container">
                <div id="audio-res">0.00 %</div>
                <div class="meter-bar">
                    <div id="left-fill" class="fill"></div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title vision">Vision System</div>
            <div class="vision-container">
                <div id="person-res">STANDBY</div>
                <div class="camera-wrapper">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');
        const audioRes = document.getElementById('audio-res');
        const personRes = document.getElementById('person-res');
        const leftFill = document.getElementById('left-fill');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');

        let model = null;

        // 【改善案1】window.onloadを排除。スクリプトが読まれたら「即座」にロードを開始
        async function loadAI() {
            try {
                if (typeof tf === 'undefined' || typeof cocoSsd === 'undefined') {
                    throw new Error("ライブラリが読み込まれていません");
                }
                
                statusDiv.innerText = "AIモデル（最速版）をダウンロード中...";
                
                // 【改善案2】最も配信が安定している標準のmobilenet_v2を使用
                model = await cocoSsd.load({ base: 'mobilenet_v2' });
                
                statusDiv.innerText = "READY";
                statusDiv.style.color = "#00f3ff";
                btn.disabled = false;
            } catch (err) {
                // 【改善案3】万が一ネットワーク等の理由でエラーになっても、強制的にボタンを使えるようにする（マイクだけでも動かす保険）
                statusDiv.innerText = "AI一時不調：ボタンを強制有効化しました (エラー: " + err.message + ")";
                statusDiv.style.color = "#ff007f";
                btn.disabled = false; 
            }
        }

        // 即時実行
        loadAI();

        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: true
                    },
                    video: {
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });

                btn.style.display = 'none';
                statusDiv.style.display = 'none';
                
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
                
                // --- ①音声系：感度50倍調整 ---
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyserL = audioCtx.createAnalyser();
                analyserL.fftSize = 256;
                source.connect(analyserL);

                const dataL = new Uint8Array(analyserL.fftSize);

                function checkVolume() {
                    analyserL.getByteTimeDomainData(dataL);

                    let maxL = 0;
                    for (let i = 0; i < dataL.length; i++) {
                        const absL = Math.abs(dataL[i] - 128);
                        if (absL > maxL) maxL = absL;
                    }

                    const boost = 50; 
                    const volL = Math.min(((maxL / 127) * 100) * boost, 100);

                    leftFill.style.width = `${volL}%`;
                    audioRes.innerText = `${volL.toFixed(2)} %`;

                    requestAnimationFrame(checkVolume);
                }

                // --- ②人認識系：確実な検知＆ターゲットマーク描画 ---
                function detectPerson() {
                    // AIモデルが正常にロードされている場合のみ実行
                    if (video.videoWidth > 0 && model) {
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);

                            const person = predictions.find(p => p.class === 'person');
                            
                            if (person) {
                                const [x, y, width, height] = person.bbox;
                                
                                // ピンクの追従ターゲット枠
                                ctx.strokeStyle = "#ff007f"; 
                                ctx.lineWidth = 6;            
                                ctx.strokeRect(x, y, width, height);

                                // 中心点
                                ctx.fillStyle = "#ff007f";
                                ctx.beginPath();
                                ctx.arc(x + (width / 2), y + (height / 2), 8, 0, 2 * Math.PI);
                                ctx.fill();
                                
                                // 画面中心からのズレ計算
                                const personCenterX = x + (width / 2);
                                const videoCenterX = canvas.width / 2;
                                const diffX = personCenterX - videoCenterX;
                                const offsetPercent = Math.round((diffX / videoCenterX) * 100);

                                if (Math.abs(offsetPercent) <= 10) {
                                    personRes.innerText = `👤 正面 (0%)`;
                                    personRes.style.color = "#00f3ff";
                                    personRes.style.borderColor = "rgba(0, 243, 255, 0.4)";
                                    personRes.style.backgroundColor = "rgba(0, 243, 255, 0.1)";
                                } else if (offsetPercent > 10) {
                                    personRes.innerText = `👉 右にズレ (${offsetPercent}%)`;
                                    personRes.style.color = "#ffb700";
                                    personRes.style.borderColor = "rgba(255, 183, 0, 0.4)";
                                    personRes.style.backgroundColor = "rgba(255, 183, 0, 0.1)";
                                } else {
                                    personRes.innerText = `👈 左にズレ (${Math.abs(offsetPercent)}%)`;
                                    personRes.style.color = "#ffb700";
                                    personRes.style.borderColor = "rgba(255, 183, 0, 0.4)";
                                    personRes.style.backgroundColor = "rgba(255, 183, 0, 0.1)";
                                }
                            } else {
                                personRes.innerText = "✖ NO TARGET";
                                personRes.style.color = "#64748b";
                                personRes.style.borderColor = "transparent";
                                personRes.style.backgroundColor = "#0d1527";
                            }
                        }).catch(e => {
                            console.error("AI判定エラー:", e);
                        });
                    }
                    setTimeout(detectPerson, 100);
                }

                checkVolume();
                detectPerson();

            } catch (err) {
                alert('起動に失敗しました: ' + err.message);
            }
        });
    </script>
</body>
</html>

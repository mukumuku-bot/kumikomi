<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-5</title>
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: #0f1626;
            --border-color: #1e293b;
            --cool-cyan: #00d2ff;
            --cool-blue: #0066cc;
            --text-main: #e2e8f0;
            --text-muted: #475569;
            --panel-glow: rgba(0, 210, 255, 0.1);
        }

        body {
            font-family: 'Consolas', 'Courier New', Courier, monospace, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
            letter-spacing: 4px;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(226, 232, 240, 0.3);
        }

        #status {
            font-size: 13px;
            color: var(--cool-cyan);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* 起動ボタン（クールステルスデザイン） */
        #btn {
            padding: 14px 45px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: var(--bg-color);
            background: var(--cool-cyan);
            border: 1px solid var(--cool-cyan);
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            transition: all 0.2s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #btn:hover:not(:disabled) {
            background: transparent;
            color: var(--cool-cyan);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.6);
        }
        #btn:disabled {
            background: #111724;
            border-color: var(--text-muted);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ダッシュボード（横画面でも常に【上に音声、下に人認識】の縦並びを強制） */
        .dashboard {
            display: flex;
            flex-direction: column; 
            align-items: center;
            gap: 20px;
            max-width: 500px;
            margin: 20px auto 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            position: relative;
        }

        /* コーナーの装飾（近未来感を演出） */
        .card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; width: 10px; height: 10px;
            border-top: 2px solid var(--cool-cyan); border-left: 2px solid var(--cool-cyan);
        }

        .card-title {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-align: left;
            color: var(--cool-cyan);
            opacity: 0.8;
        }

        /* 音声系クールUI */
        .audio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 140px;
        }
        #audio-res {
            font-size: 36px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .meter-bar {
            width: 100%;
            max-width: 300px;
            background: #060912;
            height: 12px;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #161f30;
        }
        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--cool-blue), var(--cool-cyan));
            transition: width 0.05s ease;
            box-shadow: 0 0 8px var(--cool-cyan);
        }

        /* 人認識系クールUI */
        .vision-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #person-res {
            font-size: 15px;
            font-weight: bold;
            padding: 6px 24px;
            border-radius: 2px;
            background: #060912;
            color: var(--text-muted);
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            letter-spacing: 1px;
        }
        .camera-wrapper {
            position: relative;
            width: 320px;
            height: 240px;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        #webcam {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 2;
            pointer-events: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
</head>
<body>

    <h1>06-24-5</h1>
    <div id="status">INITIALIZING SYSTEM...</div>
    <button id="btn" disabled>START SYSTEM</button>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">[ AUDIO ANALYZER ]</div>
            <div class="audio-container">
                <div id="audio-res">0.00 %</div>
                <div class="meter-bar">
                    <div id="left-fill" class="fill"></div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">[ VISION TRACKER ]</div>
            <div class="vision-container">
                <div id="person-res">SYSTEM STANDBY</div>
                <div class="camera-wrapper">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');
        const audioRes = document.getElementById('audio-res');
        const personRes = document.getElementById('person-res');
        const leftFill = document.getElementById('left-fill');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');

        let model = null;

        async function loadAI() {
            try {
                if (typeof tf === 'undefined' || typeof cocoSsd === 'undefined') {
                    throw new Error("LIBRARY CORE ERROR");
                }
                statusDiv.innerText = "LOADING VISION MODEL...";
                model = await cocoSsd.load({ base: 'mobilenet_v2' });
                statusDiv.innerText = "SYSTEM READY";
                statusDiv.style.color = "var(--cool-cyan)";
                btn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "VISION OFFLINE / AUDIO ONLY ACTIVE";
                statusDiv.style.color = "#ff3b30";
                btn.disabled = false; 
            }
        }

        loadAI();

        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: true
                    },
                    video: {
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });

                btn.style.display = 'none';
                statusDiv.style.display = 'none';
                
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
                
                // --- ①音声系：ノイズ除去＆50倍解析 ---
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                const dataArray = new Uint8Array(analyser.fftSize);

                function checkVolume() {
                    analyser.getByteTimeDomainData(dataArray);

                    let maxL = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const absL = Math.abs(dataArray[i] - 128);
                        if (absL > maxL) maxL = absL;
                    }

                    const boost = 50; 
                    let volL = 0;

                    // 【39.37%バグ修正】
                    // 1ステップ以下の無音ノイズ(maxL=1)をゲート処理で強制カット
                    if (maxL > 1) {
                        volL = Math.min((((maxL - 1) / 126) * 100) * boost, 100);
                    }

                    leftFill.style.width = `${volL}%`;
                    audioRes.innerText = `${volL.toFixed(2)} %`;

                    requestAnimationFrame(checkVolume);
                }

                // --- ②人認識系：クールマーク描画 ---
                function detectPerson() {
                    if (video.videoWidth > 0 && model) {
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);

                            const person = predictions.find(p => p.class === 'person');
                            
                            if (person) {
                                const [x, y, width, height] = person.bbox;
                                
                                // クール調ターゲットマーク（極細アイスブルー）
                                ctx.strokeStyle = "#00d2ff"; 
                                ctx.lineWidth = 3;            
                                ctx.strokeRect(x, y, width, height);

                                // 照準中心点
                                ctx.fillStyle = "#00d2ff";
                                ctx.beginPath();
                                ctx.arc(x + (width / 2), y + (height / 2), 5, 0, 2 * Math.PI);
                                ctx.fill();
                                
                                const personCenterX = x + (width / 2);
                                const videoCenterX = canvas.width / 2;
                                const diffX = personCenterX - videoCenterX;
                                const offsetPercent = Math.round((diffX / videoCenterX) * 100);

                                if (Math.abs(offsetPercent) <= 10) {
                                    personRes.innerText = "TARGET: CENTER (0%)";
                                    personRes.style.color = "var(--cool-cyan)";
                                    personRes.style.borderColor = "var(--cool-cyan)";
                                    personRes.style.backgroundColor = "rgba(0, 210, 255, 0.1)";
                                } else if (offsetPercent > 10) {
                                    personRes.innerText = `TARGET: RIGHT_OFFSET (+${offsetPercent}%)`;
                                    personRes.style.color = "#ffffff";
                                    personRes.style.borderColor = "#475569";
                                    personRes.style.backgroundColor = "rgba(255, 255, 255, 0.05)";
                                } else {
                                    personRes.innerText = `TARGET: LEFT_OFFSET (-${Math.abs(offsetPercent)}%)`;
                                    personRes.style.color = "#ffffff";
                                    personRes.style.borderColor = "#475569";
                                    personRes.style.backgroundColor = "rgba(255, 255, 255, 0.05)";
                                }
                            } else {
                                personRes.innerText = "NO TARGET DETECTED";
                                personRes.style.color = "var(--text-muted)";
                                personRes.style.borderColor = "var(--border-color)";
                                personRes.style.backgroundColor = "#060912";
                            }
                        }).catch(e => {
                            console.error(e);
                        });
                    }
                    setTimeout(detectPerson, 100);
                }

                checkVolume();
                detectPerson();

            } catch (err) {
                alert('ERROR: ' + err.message);
            }
        });
    </script>
</body>
</html>

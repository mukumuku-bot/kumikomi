<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-10</title>
    <style>
        :root {
            --bg: #050810;
            --cyan: #00d2ff;
            --text: #e2e8f0;
        }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace, sans-serif; overflow: hidden;
        }
        
        /* 【上に音声】極限までシンプルにした上部音声インジケーター */
        #audio-panel {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 12px 20px; box-sizing: border-box; z-index: 10;
            background: rgba(5, 8, 16, 0.85);
            display: flex; align-items: center; justify-content: center; gap: 15px;
            border-bottom: 1px solid #101a30; pointer-events: none;
        }
        #audio-res { font-size: 15px; font-weight: bold; width: 70px; text-align: right; color: var(--cyan); }
        .meter-bar { width: 150px; background: #0c1322; height: 5px; border-radius: 2px; overflow: hidden; }
        .fill { height: 100%; width: 0%; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

        /* 全画面表示の「目」用キャンバス */
        #eye-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* クール調起動ボタン */
        #btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 40px; font-size: 15px; font-weight: bold; cursor: pointer;
            color: var(--bg); background: var(--cyan); border: none; border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); z-index: 20;
            letter-spacing: 2px; text-transform: uppercase;
        }
        #btn:disabled { background: #111724; color: #475569; box-shadow: none; cursor: not-allowed; }
        #status {
            position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center;
            font-size: 12px; color: var(--cyan); letter-spacing: 2px; z-index: 10;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
</head>
<body>

    <div id="audio-panel">
        <span style="font-size:11px; letter-spacing:1px;">AUDIO_AUDIO ANALYZER</span>
        <div class="meter-bar"><div id="left-fill" class="fill"></div></div>
        <div id="audio-res">0.00%</div>
    </div>

    <button id="btn" disabled>INITIALIZING...</button>
    <div id="status">LOADING EYE-TRACKING CORE...</div>

    <video id="webcam" autoplay playsinline muted style="display:none;"></video>
    
    <canvas id="eye-canvas"></canvas>

    <script>
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');
        const audioRes = document.getElementById('audio-res');
        const leftFill = document.getElementById('left-fill');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('eye-canvas');
        const ctx = canvas.getContext('2d');
        
        let model = null;
        let audioCtx = null, analyser = null, dataArray = null;

        // 目のアニメーション制御
        let eyePos = { x: 0, y: 0 };      // 現在の目の位置
        let targetPos = { x: 0, y: 0 };   // 目標の位置
        let personOffset = 0;             // 人の左右のズレ（-1.0〜1.0）
        let hasPerson = false;
        let lastIdlingTime = 0;
        let idleRandomX = 0;
        let idleRandomY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        (async function loadAI() {
            try {
                model = await blazeface.load();
                statusDiv.innerText = "SYSTEM READY";
                btn.innerText = "ACTIVATE EYE";
                btn.disabled = false;
            } catch (err) {
                statusDiv.innerText = "CRITICAL ERROR / VISION OFFLINE";
            }
        })();

        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: true },
                    // AI処理を極限まで軽くするためカメラ内部解像度をあえて低めに設定
                    video: { facingMode: "user", width: 320, height: 240 } 
                });

                btn.style.display = 'none';
                statusDiv.style.display = 'none';
                video.srcObject = stream;

                // ① AUDIO SYSTEM
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                audioCtx.createMediaStreamSource(stream).connect(analyser);
                dataArray = new Uint8Array(analyser.fftSize);

                function checkVolume() {
                    analyser.getByteTimeDomainData(dataArray);
                    let maxL = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const absL = Math.abs(dataArray[i] - 128);
                        if (absL > maxL) maxL = absL;
                    }
                    let volL = (maxL > 1) ? Math.min((((maxL - 1) / 126) * 100) * 50, 100) : 0;
                    leftFill.style.width = `${volL}%`;
                    audioRes.innerText = `${volL.toFixed(2)}%`;
                    requestAnimationFrame(checkVolume);
                }

                // ② 裏で高速動作するAI視線ロジック
                function detect() {
                    if (video.videoWidth > 0 && model) {
                        model.estimateFaces(video, false).then(predictions => {
                            if (predictions.length > 0) {
                                hasPerson = true;
                                const landmarks = predictions[0].landmarks;
                                const eyesCenterX = (landmarks[0][0] + landmarks[1][0]) / 2;
                                // 鏡映し状態を補正して左右の比率を算出 (-1.0 〜 +1.0)
                                personOffset = -((eyesCenterX - 160) / 160); 
                            } else {
                                hasPerson = false;
                            }
                        });
                    }
                    setTimeout(detect, 50); // 最適な検出スパンで動作
                }

                // ③ 全画面の目：描画 ＆【遊ばせる動き】ループ
                function drawLoop() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    const maxEyeMove = Math.min(canvas.width, canvas.height) * 0.18; // 目の可動範囲
                    const now = Date.now();

                    if (hasPerson) {
                        // 【遊びの動き①：生体ジッター】
                        // 人をキリッと見つめつつ、生き物らしさを出すために常に微細にピクピクと震わせる
                        const jitterX = Math.sin(now / 120) * 5;
                        const jitterY = Math.cos(now / 80) * 3;
                        
                        targetPos.x = personOffset * maxEyeMove + jitterX;
                        targetPos.y = jitterY;
                    } else {
                        // 【遊びの動き②：自律キョロキョロモード】
                        // 人がいない時は、約1.8秒ごとに「ハッ」とあらぬ方向をランダムに見渡す
                        if (now - lastIdlingTime > 1800) {
                            idleRandomX = (Math.random() - 0.5) * 2 * maxEyeMove;
                            idleRandomY = (Math.random() - 0.5) * 1.2 * maxEyeMove;
                            lastIdlingTime = now;
                        }
                        // アイドリング位置へゆったり呼吸するように合流
                        targetPos.x = idleRandomX + Math.sin(now / 500) * 6;
                        targetPos.y = idleRandomY + Math.cos(now / 400) * 4;
                    }

                    // 線形補間(イージング)で、黒目の動きをヌルヌル滑らかにする
                    eyePos.x += (targetPos.x - eyePos.x) * 0.12;
                    eyePos.y += (targetPos.y - eyePos.y) * 0.12;

                    // --- クールなSFサイバー・アイの描画 ---
                    const baseRadius = Math.min(canvas.width, canvas.height) * 0.22;

                    // 1. 固定の外枠サークル
                    ctx.strokeStyle = "rgba(0, 210, 255, 0.1)";
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.arc(centerX, centerY, baseRadius * 1.4, 0, Math.PI * 2); ctx.stroke();

                    // 2. メインの目枠（ロックオンサークル）
                    ctx.strokeStyle = "rgba(0, 210, 255, 0.3)";
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(centerX, centerY, baseRadius, 0, Math.PI * 2); ctx.stroke();

                    // 十字スリット
                    ctx.strokeStyle = "rgba(0, 210, 255, 0.08)";
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(centerX - baseRadius, centerY); ctx.lineTo(centerX + baseRadius, centerY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(centerX, centerY - baseRadius); ctx.lineTo(centerX, centerY + baseRadius); ctx.stroke();

                    // 3. 動く虹彩・瞳孔コア（ターゲットを追従）
                    const pupilX = centerX + eyePos.x;
                    const pupilY = centerY + eyePos.y;

                    // 虹彩リング（グローエフェクト付き）
                    ctx.strokeStyle = "var(--cyan)";
                    ctx.lineWidth = 4;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "var(--cyan)";
                    ctx.beginPath(); ctx.arc(pupilX, pupilY, baseRadius * 0.42, 0, Math.PI * 2); ctx.stroke();

                    // 瞳孔（中心コア）
                    ctx.fillStyle = "var(--cyan)";
                    ctx.beginPath(); ctx.arc(pupilX, pupilY, baseRadius * 0.15, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.shadowBlur = 0; // 負荷軽減のためシャドウ即解除

                    // システムテキスト（キャンバス一体型で超軽量）
                    ctx.fillStyle = hasPerson ? "var(--cyan)" : "#475569";
                    ctx.font = "11px 'Consolas'";
                    ctx.textAlign = "center";
                    const statusText = hasPerson ? `SYS_LOCK_ON // TRK_OFFSET: ${Math.round(personOffset * 100)}%` : "SYS_SEARCHING_TARGET...";
                    ctx.fillText(statusText, centerX, centerY + baseRadius * 1.8);

                    requestAnimationFrame(drawLoop);
                }

                checkVolume();
                detect();
                drawLoop();
            } catch (err) { alert('ERROR: ' + err.message); }
        });
    </script>
</body>
</html>

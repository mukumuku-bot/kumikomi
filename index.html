<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-2</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #fff; padding-top: 20px; margin: 0; }
        #btn { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #00ffcc; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        #btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        #status { color: #ffcc00; font-size: 16px; margin-bottom: 10px; padding: 0 10px; word-break: break-all; }
        
        #result-container { display: flex; justify-content: center; gap: 20px; font-size: 22px; font-weight: bold; margin-top: 20px; min-height: 40px; }
        .res-box { padding: 10px 20px; border-radius: 5px; background: #333; min-width: 200px; transition: all 0.2s; }
        #audio-res { color: #00ffcc; }
        #person-res { color: #aaa; }
        
        #display-area { display: flex; justify-content: center; align-items: flex-end; gap: 40px; margin-top: 20px; }
        
        .meter-container { display: flex; flex-direction: column; align-items: center; }
        .meter { width: 60px; background: #444; height: 240px; position: relative; display: flex; align-items: flex-end; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .fill { width: 100%; background: linear-gradient(to top, #00ffcc, #ff007f); height: 0%; transition: height 0.05s; }
        
        .video-container { display: flex; flex-direction: column; align-items: center; }
        .camera-wrapper { position: relative; width: 320px; height: 240px; margin-top: 10px; background: #000; border-radius: 5px; overflow: hidden; }
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>

    <h1>06-24-2</h1>
    <div id="status">システム初期化中...</div>
    <button id="btn" disabled>起動する</button>

    <div id="result-container">
        <div id="audio-res" class="res-box">🎵 音量: 0.00%</div>
        <div id="person-res" class="res-box">-- 人検知 --</div>
    </div>

    <div id="display-area">
        <div class="meter-container">
            <div>CH1 (極限高感度)</div>
            <div class="meter"><div id="left-fill" class="fill"></div></div>
        </div>
        
        <div class="video-container">
            <div>インカメ映像（自動マーク）</div>
            <div class="camera-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="overlay"></canvas>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');
        const audioRes = document.getElementById('audio-res');
        const personRes = document.getElementById('person-res');
        const leftFill = document.getElementById('left-fill');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');

        let model = null;

        // どこで止まったか追跡するための関数
        function updateStatus(text, isError = false) {
            statusDiv.innerText = text;
            statusDiv.style.color = isError ? "#ff007f" : "#ffcc00";
            console.log(text);
        }

        // ライブラリ自体の読み込みチェック
        window.addEventListener('load', () => {
            if (typeof tf === 'undefined' || typeof cocoSsd === 'undefined') {
                updateStatus("エラー: AIライブラリのダウンロードに失敗しました。ネット接続を確認してください。", true);
                return;
            }

            updateStatus("AIモデルをダウンロード中（軽量版）...");

            // 【対策】スマホ向けに超軽量モデル 'lite_mobilenet_v2' を指定してロードを爆速化
            cocoSsd.load({ base: 'lite_mobilenet_v2' }).then(loadedModel => {
                model = loadedModel;
                statusDiv.innerText = "AI準備完了！ボタンを押せます。";
                statusDiv.style.color = "#00ffcc";
                btn.disabled = false;
            }).catch(err => {
                updateStatus("AIモデルの展開エラー: " + err.message, true);
            });
        });

        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        channelCount: 1,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: true
                    },
                    video: {
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });

                btn.style.display = 'none';
                statusDiv.style.display = 'none';
                
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };
                
                // --- ①マイク音量の「極限」高感度解析 ＆ 数値化 ---
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyserL = audioCtx.createAnalyser();
                analyserL.fftSize = 256;
                source.connect(analyserL);

                const dataL = new Uint8Array(analyserL.fftSize);

                function checkVolume() {
                    analyserL.getByteTimeDomainData(dataL);

                    let maxL = 0;
                    for (let i = 0; i < dataL.length; i++) {
                        const absL = Math.abs(dataL[i] - 128);
                        if (absL > maxL) maxL = absL;
                    }

                    const boost = 200; 
                    const volL = Math.min(((maxL / 127) * 100) * boost, 100);

                    leftFill.style.height = `${volL}%`;
                    audioRes.innerText = `🎵 音量: ${volL.toFixed(2)}%`;

                    requestAnimationFrame(checkVolume);
                }

                // --- ②AIによる確実な人検知 ＆ ターゲットマーク描画 ---
                function detectPerson() {
                    if (video.videoWidth > 0 && model) {
                        model.detect(video).then(predictions => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);

                            const person = predictions.find(p => p.class === 'person');
                            
                            if (person) {
                                const [x, y, width, height] = person.bbox;
                                
                                // 人の周りにマークを描画
                                ctx.strokeStyle = "#ff007f"; 
                                ctx.lineWidth = 6;            
                                ctx.strokeRect(x, y, width, height);

                                // 中心の照準ドット
                                ctx.fillStyle = "#ff007f";
                                ctx.beginPath();
                                ctx.arc(x + (width / 2), y + (height / 2), 8, 0, 2 * Math.PI);
                                ctx.fill();
                                
                                // ズレパーセンテージ
                                const personCenterX = x + (width / 2);
                                const videoCenterX = canvas.width / 2;
                                const diffX = personCenterX - videoCenterX;
                                const offsetPercent = Math.round((diffX / videoCenterX) * 100);

                                if (Math.abs(offsetPercent) <= 10) {
                                    personRes.innerText = `👤 正面 (0%)`;
                                    personRes.style.color = "#00ffcc";
                                    personRes.style.backgroundColor = "rgba(0, 255, 204, 0.2)";
                                } else if (offsetPercent > 10) {
                                    personRes.innerText = `👉 右にズレ (${offsetPercent}%)`;
                                    personRes.style.color = "#ffaa00";
                                    personRes.style.backgroundColor = "rgba(255, 170, 0, 0.2)";
                                } else {
                                    personRes.innerText = `👈 左にズレ (${Math.abs(offsetPercent)}%)`;
                                    personRes.style.color = "#ffaa00";
                                    personRes.style.backgroundColor = "rgba(255, 170, 0, 0.2)";
                                }
                            } else {
                                personRes.innerText = "✖ 誰もいない";
                                personRes.style.color = "#aaa";
                                personRes.style.backgroundColor = "#333";
                            }
                        }).catch(e => {
                            console.error("AI判定エラー:", e);
                        });
                    }
                    setTimeout(detectPerson, 100);
                }

                checkVolume();
                detectPerson();

            } catch (err) {
                alert('起動に失敗しました: ' + err.message);
            }
        });
    </script>
</body>
</html>

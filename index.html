<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06-24-23 (System Eyes)</title>
    <style>
        :root {
            --bg: #1a1d24;
            --card: #252a34;
            --accent: #89b4fa; /* 優しい青 */
            --text: #cdd6f4;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #eye-header {
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #1e222a 0%, #1a1d24 100%);
        }
        
        /* 目のキャンバスを少し大きく、丸みを強調 */
        #eye-canvas { width: 500px; height: 250px; }

        .content-wrapper { padding: 30px 20px; width: 100%; max-width: 500px; }
        
        h1 { font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 20px; color: var(--accent); opacity: 0.8; }
        
        #btn {
            width: 100%; padding: 15px; font-size: 16px; cursor: pointer;
            color: white; background: var(--accent); border: none;
            border-radius: 12px; font-weight: bold;
        }

        .camera-wrapper { 
            position: relative; width: 100%; height: 200px; 
            background: #000; border-radius: 15px; overflow: hidden; margin-top: 20px;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
</head>
<body>

    <div id="eye-header">
        <canvas id="eye-canvas" width="500" height="250"></canvas>
    </div>

    <div class="content-wrapper">
        <h1>06-24-23</h1>
        <button id="btn">ACTIVATE SYSTEM</button>
        <div class="camera-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
    </div>

    <script>
        const btn = document.getElementById('btn');
        const video = document.getElementById('webcam');
        const eyeCanvas = document.getElementById('eye-canvas');
        const ctx = eyeCanvas.getContext('2d');
        
        let model = null;
        
        // アニメーション用変数
        let eyeX = 0, eyeY = 0; // 現在の瞳の位置
        let targetX = 0, targetY = 0; // 目標の瞳の位置
        let isBlinking = false;
        let blinkTimer = 0;

        // 初期化
        (async function loadAI() {
            model = await cocoSsd.load({ base: 'mobilenet_v2' });
            btn.innerText = "SYSTEM ONLINE";
        })();

        // 描画ループ (60fps)
        function animate() {
            // 滑らかに追従 (Lerp処理)
            eyeX += (targetX - eyeX) * 0.1;
            eyeY += (targetY - eyeY) * 0.1;

            drawEyes();
            requestAnimationFrame(animate);
        }
        animate();

        function drawEyes() {
            ctx.clearRect(0, 0, eyeCanvas.width, eyeCanvas.height);
            const cx = eyeCanvas.width / 2;
            const cy = eyeCanvas.height / 2;
            const gap = 110;
            const radius = 60;

            // 白目 (少し角丸っぽく見せるために少し楕円気味に)
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.ellipse(cx - gap, cy, radius, radius + 10, 0, 0, Math.PI * 2);
            ctx.ellipse(cx + gap, cy, radius, radius + 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // まばたき処理
            if (isBlinking) {
                ctx.fillStyle = "#ffffff"; // まぶたを閉じる
                ctx.beginPath();
                ctx.fillRect(cx - gap - radius, cy - 10, radius * 2, 20);
                ctx.fillRect(cx + gap - radius, cy - 10, radius * 2, 20);
                return;
            }

            // 黒目
            ctx.fillStyle = "#2d3436";
            ctx.beginPath();
            ctx.arc(cx - gap + eyeX, cy + eyeY, 25, 0, Math.PI * 2);
            ctx.arc(cx + gap + eyeX, cy + eyeY, 25, 0, Math.PI * 2);
            ctx.fill();

            // ハイライト (うるうる感)
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.beginPath();
            ctx.arc(cx - gap + eyeX - 8, cy + eyeY - 8, 8, 0, Math.PI * 2);
            ctx.arc(cx + gap + eyeX - 8, cy + eyeY - 8, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        // まばたきランダム発生
        setInterval(() => {
            if (Math.random() < 0.2) {
                isBlinking = true;
                setTimeout(() => isBlinking = false, 150);
            }
        }, 3000);

        btn.addEventListener('click', async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            btn.style.display = 'none';

            // 追跡ループ
            function detect() {
                model.detect(video).then(preds => {
                    const person = preds.find(p => p.class === 'person');
                    if (person) {
                        const [x, y, w, h] = person.bbox;
                        // 画面中央に対する相対位置 (-1.0 to 1.0)
                        targetX = ((x + w/2) / video.videoWidth - 0.5) * 100;
                        targetY = ((y + h/2) / video.videoHeight - 0.5) * 100;
                    } else {
                        targetX = 0; targetY = 0;
                    }
                    setTimeout(detect, 100);
                });
            }
            detect();
        });
    </script>
</body>
</html>

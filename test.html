<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone対応！音声文字起こし & ワン！</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        h1 {
            text-align: center;
            font-size: 24px;
            color: #2c3e50;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #start-btn { background-color: #2ecc71; color: white; }
        #start-btn:hover { background-color: #27ae60; }
        #start-btn:disabled { background-color: #bdc3c7; }
        
        #stop-btn { background-color: #e74c3c; color: white; }
        #stop-btn:hover { background-color: #c0392b; }
        #stop-btn:disabled { background-color: #bdc3c7; }

        #status {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        #output {
            border: 1px solid #dcdde1;
            border-radius: 4px;
            padding: 15px;
            min-height: 250px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            background: #fafafa;
            line-height: 1.6;
        }
        .interim { color: #95a5a6; font-style: italic; }

        .settings-section {
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .settings-section h2 {
            font-size: 18px;
            color: #34495e;
            margin-bottom: 15px;
        }
        .settings-item {
            margin-bottom: 15px;
        }
        .settings-item label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #7f8c8d;
        }
        #keywords-input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .info-text {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>音声文字起こしツール</h1>
    
    <div class="btn-group">
        <button id="start-btn">録音開始</button>
        <button id="stop-btn" disabled>停止</button>
    </div>
    
    <p id="status">「録音開始」を押してマイクを許可してください</p>
    <div id="output" placeholder="ここに文字おこしが表示されます..."></div>

    <div class="settings-section">
        <h2>鳴くキーワード設定（ワン！）</h2>
        <div class="settings-item">
            <label for="keywords-input">キーワード（カンマ区切り）:</label>
            <input type="text" id="keywords-input" value="ワン,わんわん,犬,テスト">
            <p class="info-text">キーワードを検知すると、iPhoneでも音が鳴るようにマイクを一瞬制御します。</p>
        </div>
    </div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusText = document.getElementById('status');
    const outputDiv = document.getElementById('output');
    const keywordsInput = document.getElementById('keywords-input');

    let isRunning = false;   // ユーザーが「録音開始」しているかどうかのフラグ
    let isBarking = false;   // いま「ワン！」と鳴いている最中かどうかのフラグ
    let finalTranscript = '';

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        statusText.textContent = "お使いのブラウザは音声認識に対応していません。";
        startBtn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;

        // ★鳴く処理（鳴き終わったらマイクを再開する）
        function triggerBark() {
            isBarking = true;
            recognition.stop(); // 1. まずマイクを止める（iPhoneの音を出せるようにするため）
        }

        function speakBark() {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance('ワン！');
            utterance.lang = 'ja-JP';
            utterance.rate = 1.6;
            utterance.pitch = 1.8;

            // 鳴き終わったときの処理
            utterance.onend = () => {
                isBarking = false;
                // ユーザーが停止ボタンを押していなければ、マイクを再開する
                if (isRunning) {
                    recognition.start();
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        recognition.onstart = () => {
            statusText.textContent = "音声認識中... 「テスト」や「犬」と言ってみてね！";
            statusText.style.color = "#2ecc71";
            startBtn.disabled = true;
            stopBtn.disabled = false;
        };

        recognition.onresult = (event) => {
            let interimTranscript = '';
            let barkNeeded = false;

            const keywordsText = keywordsInput.value;
            const barkKeywords = keywordsText.split(',').map(key => key.trim()).filter(key => key !== '');

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const transcript = event.results[i][0].transcript;
                    finalTranscript += transcript + '\n';

                    barkKeywords.forEach(keyword => {
                        if (transcript.includes(keyword)) {
                            barkNeeded = true;
                        }
                    });
                } else {
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            outputDiv.innerHTML = finalTranscript + '<span class="interim">' + interimTranscript + '</span>';
            outputDiv.scrollTop = outputDiv.scrollHeight;

            // キーワードが見つかったら、マイク停止をトリガー
            if (barkNeeded && !isBarking) {
                triggerBark();
            }
        };

        recognition.onerror = (event) => {
            // アイフォンで一度マイクを切るときに出るエラーなどは無視する
            if (event.error !== 'aborted') {
                statusText.textContent = "エラーが発生しました: " + event.error;
                statusText.style.color = "#e74c3c";
            }
        };

        recognition.onend = () => {
            // 「ワン！」のためにマイクを止めた場合
            if (isBarking) {
                speakBark(); // 音声を鳴らす
            } else if (!isRunning) {
                // 本当に停止ボタンが押された場合
                statusText.textContent = "停止しました。";
                statusText.style.color = "#7f8c8d";
                startBtn.disabled = false;
                stopBtn.disabled = true;
            } else {
                // ブラウザが勝手にマイクを切った場合は自動再起動
                recognition.start();
            }
        };

        startBtn.addEventListener('click', () => {
            isRunning = true;
            finalTranscript = '';
            outputDiv.innerHTML = '';
            recognition.start();
        });

        stopBtn.addEventListener('click', () => {
            isRunning = false;
            isBarking = false;
            recognition.stop();
        });
    }
</script>
</body>
</html>

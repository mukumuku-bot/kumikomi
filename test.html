<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ver07-01-02</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f5f7fa;
        }
        button {
            font-size: 20px;
            padding: 15px 30px;
            margin: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        #status {
            font-size: 18px;
            color: #666;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>ver07-01-02</h1>
    <button id="start-btn">録音開始</button>
    <button id="stop-btn" disabled>停止</button>
    <div id="status">「録音開始」を押してください</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const statusText = document.getElementById('status');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let audioCtx = null;

    // ★iPhoneのマイクON中でも強制的に「ピピッ！」と鳴らすための電子音関数
    function playBeep() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // 1音目（ピ）
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1000, audioCtx.currentTime); // 高い音
            gain1.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.1);

            // 2音目（ピッ）
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.12); // さらに高い音
            gain2.gain.setValueAtTime(0.3, audioCtx.currentTime + 0.12);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(audioCtx.currentTime + 0.12);
            osc2.stop(audioCtx.currentTime + 0.25);

        } catch (e) {
            console.error("オーディオ再生エラー:", e);
        }
    }

    if (!SpeechRecognition) {
        statusText.textContent = "このブラウザは音声認識に対応していません。";
    } else {
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onstart = () => {
            statusText.textContent = "認識中... 触らずに「テスト」や「ワン」と言ってね";
            statusText.style.color = "#2ecc71";
            // iOSのオーディオ再生制限を解除するため、タップ時にContextを作成しておく
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        };

        recognition.onresult = (event) => {
            let trigger = false;
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const text = event.results[i][0].transcript;
                    // 反応するキーワード（シンプルに3つだけ）
                    if (text.includes("テスト") || text.includes("ワン") || text.includes("犬")) {
                        trigger = true;
                    }
                }
            }
            if (trigger) {
                playBeep(); // 条件に合致したら音を鳴らす
            }
        };

        recognition.onerror = (event) => {
            if (event.error !== 'aborted') {
                statusText.textContent = "エラー: " + event.error;
                statusText.style.color = "#e74c3c";
            }
        };

        recognition.onend = () => {
            // 停止ボタンが押されていないなら自動でマイクを再起動（無限ループ）
            if (startBtn.disabled) {
                recognition.start();
            } else {
                statusText.textContent = "停止しました。";
                statusText.style.color = "#7f8c8d";
            }
        };

        startBtn.addEventListener('click', () => {
            startBtn.disabled = true;
            stopBtn.disabled = false;
            recognition.start();
        });

        stopBtn.addEventListener('click', () => {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            recognition.stop();
        });
    }
</script>
</body>
</html>

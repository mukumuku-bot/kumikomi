                                            .map(key => key.trim())
                                            .filter(key => key !== '');

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                // 確定したテキスト
                if (event.results[i].isFinal) {
                    const transcript = event.results[i][0].transcript;
                    finalTranscript += transcript + '\n';

                    // --- 追加：キーワード判定ロジック ---
                    // 確定したテキストの中に、キーワードが一つでも含まれているかチェック
                    barkKeywords.forEach(keyword => {
                        if (transcript.includes(keyword)) {
                            barkNeeded = true; // 含まれていればフラグをオン
                        }
                    });

                } else {
                    // 認識途中のテキスト
                    interimTranscript += event.results[i][0].transcript;
                }
            }

            // --- 追加：フラグがオンなら音を鳴らす ---
            if (barkNeeded) {
                // すでに鳴っている場合は最初に戻す（連続で言われた時のため）
                barkAudio.currentTime = 0;
                barkAudio.play()
                    .catch(e => console.error("音声再生に失敗しました:", e)); // エラーハンドリング
            }

            outputDiv.innerHTML = finalTranscript + '<span class="interim">' + interimTranscript + '</span>';
            outputDiv.scrollTop = outputDiv.scrollHeight;
        };

        recognition.onerror = (event) => {
            statusText.textContent = "エラーが発生しました: " + event.error;
            statusText.style.color = "#e74c3c";
        };

        recognition.onend = () => {
            statusText.textContent = "停止しました。";
            statusText.style.color = "#7f8c8d";
            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        startBtn.addEventListener('click', () => {
            recognition.start();
        });

        stopBtn.addEventListener('click', () => {
            recognition.stop();
        });
    }
</script>
</body>
</html>
